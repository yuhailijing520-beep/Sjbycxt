<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界杯预测系统 — WorldCup Oracle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #D4AF37;
    --gold-light: #F0D060;
    --green-pitch: #1a5c2a;
    --green-dark: #0d3318;
    --white: #f5f5f0;
    --gray: #888;
    --card-bg: rgba(255,255,255,0.05);
    --card-border: rgba(212,175,55,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050e07;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(26,92,42,0.4) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(13,51,24,0.5) 0%, transparent 50%);
    color: var(--white);
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 0.5px solid var(--card-border);
    backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 100;
    background: rgba(5,14,7,0.85);
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(212,175,55,0.4);
  }
  .logo span { color: var(--white); }
  .nav { display: flex; gap: 24px; }
  .nav a { color: rgba(245,245,240,0.6); text-decoration: none; font-size: 13px; letter-spacing: 1px; transition: color 0.2s; }
  .nav a:hover, .nav a.active { color: var(--gold); }
  /* 解锁广告逻辑已移除 */

  /* Hero */
  .hero {
    text-align: center;
    padding: 70px 20px 50px;
    position: relative;
  }
  .hero-badge {
    display: inline-block;
    border: 0.5px solid var(--gold);
    color: var(--gold);
    font-size: 11px;
    letter-spacing: 3px;
    padding: 5px 16px;
    border-radius: 20px;
    margin-bottom: 24px;
    text-transform: uppercase;
  }
  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 8vw, 96px);
    letter-spacing: 4px;
    line-height: 1;
    color: var(--white);
    margin-bottom: 8px;
  }
  .hero h1 em {
    font-style: normal;
    background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero p {
    color: rgba(245,245,240,0.55);
    font-size: 15px;
    max-width: 480px;
    margin: 16px auto 36px;
    line-height: 1.7;
  }
  .accuracy-strip {
    display: inline-flex;
    align-items: center;
    gap: 32px;
    background: var(--card-bg);
    border: 0.5px solid var(--card-border);
    border-radius: 16px;
    padding: 16px 32px;
    backdrop-filter: blur(8px);
  }
  .acc-item { text-align: center; }
  .acc-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: var(--gold);
    line-height: 1;
  }
  .acc-label { font-size: 11px; color: rgba(245,245,240,0.45); letter-spacing: 1px; margin-top: 4px; }
  .sep { width: 0.5px; height: 40px; background: var(--card-border); }

  /* Matches Section */
  .section { padding: 48px 40px; max-width: 1100px; margin: 0 auto; }
  .section-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px;
  }
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: 2px; color: var(--white);
  }
  .filter-tabs { display: flex; gap: 8px; }
  .tab {
    background: none; border: 0.5px solid rgba(245,245,240,0.15);
    color: rgba(245,245,240,0.5);
    padding: 6px 16px; border-radius: 20px;
    font-size: 12px; cursor: pointer; transition: all 0.2s;
    font-family: 'Noto Sans SC', sans-serif;
  }
  .tab.active, .tab:hover {
    border-color: var(--gold); color: var(--gold);
    background: rgba(212,175,55,0.08);
  }

  /* Match Cards */
  .matches-grid { display: flex; flex-direction: column; gap: 12px; }
  .match-card {
    background: var(--card-bg);
    border: 0.5px solid var(--card-border);
    border-radius: 16px;
    padding: 20px 28px;
    display: grid;
    grid-template-columns: 1fr auto 1fr auto;
    align-items: center;
    gap: 20px;
    transition: border-color 0.2s, background 0.2s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .match-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(212,175,55,0.03) 0%, transparent 60%);
  }
  .match-card:hover { border-color: rgba(212,175,55,0.5); background: rgba(255,255,255,0.07); }
  .match-card.locked { opacity: 0.7; }

  .team { display: flex; align-items: center; gap: 14px; }
  .team.right { flex-direction: row-reverse; }
  .team-flag { font-size: 32px; line-height: 1; }
  .team-name { font-size: 15px; font-weight: 500; }
  .team-rank { font-size: 11px; color: var(--gray); }

  .match-center { text-align: center; }
  .match-time { font-size: 11px; color: var(--gray); letter-spacing: 1px; margin-bottom: 6px; }
  .vs-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 2px; color: rgba(245,245,240,0.3);
  }
  .match-stage {
    font-size: 10px; color: var(--gold);
    background: rgba(212,175,55,0.12);
    padding: 2px 8px; border-radius: 10px; margin-top: 6px;
    display: inline-block; letter-spacing: 1px;
  }

  .prediction-panel { min-width: 200px; }
  .predict-btn {
    width: 100%; background: none;
    border: 0.5px solid var(--gold);
    color: var(--gold); padding: 10px 20px;
    border-radius: 10px; font-family: 'Noto Sans SC', sans-serif;
    font-size: 13px; cursor: pointer;
    transition: all 0.2s; letter-spacing: 1px;
  }
  .predict-btn:hover { background: rgba(212,175,55,0.15); }
  .predict-btn.locked-btn {
    border-color: rgba(245,245,240,0.2);
    color: rgba(245,245,240,0.3);
  }

  .win-bars { margin-top: 10px; }
  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .bar-label { font-size: 11px; color: var(--gray); width: 50px; }
  .bar-track { flex: 1; height: 4px; background: rgba(245,245,240,0.08); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; transition: width 0.8s ease; }
  .bar-fill.win { background: linear-gradient(90deg, #2ecc71, #1a9e53); }
  .bar-fill.draw { background: linear-gradient(90deg, var(--gold), #8a6e10); }
  .bar-fill.lose { background: linear-gradient(90deg, #e74c3c, #9e1a1a); }
  .bar-pct { font-size: 11px; color: rgba(245,245,240,0.6); width: 32px; text-align: right; }

  /* Lock overlay */
  .lock-overlay {
    position: absolute; right: 28px; top: 50%; transform: translateY(-50%);
    display: flex; align-items: center; gap: 8px;
    background: rgba(5,14,7,0.8); border: 0.5px solid rgba(245,245,240,0.15);
    padding: 8px 14px; border-radius: 10px;
  }
  .lock-icon { font-size: 16px; }
  .lock-text { font-size: 12px; color: rgba(245,245,240,0.5); }

  /* AI Analysis Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.85); z-index: 200;
    align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #0d1f10;
    border: 0.5px solid var(--card-border);
    border-radius: 24px;
    padding: 36px;
    max-width: 640px;
    width: 90%;
    max-height: 85vh;
    overflow-y: auto;
    position: relative;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-close {
    position: absolute; top: 16px; right: 20px;
    background: none; border: none; color: var(--gray);
    font-size: 22px; cursor: pointer; line-height: 1;
    transition: color 0.2s;
  }
  .modal-close:hover { color: var(--white); }
  .modal-match-header {
    display: flex; align-items: center; justify-content: center; gap: 20px;
    margin-bottom: 28px; padding-bottom: 20px;
    border-bottom: 0.5px solid var(--card-border);
  }
  .modal-team { text-align: center; }
  .modal-flag { font-size: 40px; }
  .modal-team-name { font-size: 14px; font-weight: 500; margin-top: 6px; }
  .modal-vs { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--gray); }
  .modal-section-title {
    font-size: 11px; color: var(--gold); letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 14px; margin-top: 20px;
  }
  .prediction-result {
    background: rgba(212,175,55,0.08); border: 0.5px solid var(--card-border);
    border-radius: 14px; padding: 20px; margin-bottom: 16px;
    text-align: center;
  }
  .pred-winner { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--gold); letter-spacing: 2px; }
  .pred-confidence { font-size: 13px; color: rgba(245,245,240,0.6); margin-top: 4px; }
  .ai-analysis-text {
    font-size: 14px; line-height: 1.8; color: rgba(245,245,240,0.75);
  }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
  .stat-item {
    background: rgba(255,255,255,0.03); border: 0.5px solid rgba(245,245,240,0.1);
    border-radius: 10px; padding: 12px 14px;
  }
  .stat-name { font-size: 11px; color: var(--gray); margin-bottom: 4px; }
  .stat-value { font-size: 15px; font-weight: 500; }
  .loading-dots span {
    display: inline-block; width: 8px; height: 8px;
    background: var(--gold); border-radius: 50%; margin: 0 3px;
    animation: bounce 1.2s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }

  .tag { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 8px; margin-left: 6px; vertical-align: middle; }
  .tag-hot { background: rgba(231,76,60,0.2); color: #e74c3c; border: 0.5px solid rgba(231,76,60,0.3); }
  .tag-new { background: rgba(46,204,113,0.2); color: #2ecc71; border: 0.5px solid rgba(46,204,113,0.3); }

  @media (max-width: 600px) {
    .header { padding: 14px 16px; }
    .nav { display: none; }
    .section { padding: 32px 16px; }
    .match-card { grid-template-columns: 1fr; gap: 12px; }
    .accuracy-strip { gap: 16px; padding: 12px 20px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="logo">WORLD<span>CUP</span> ORACLE</div>
  <nav class="nav">
    <a href="#schedule" class="active">赛程预测</a>
    <a href="#history">历史数据</a>
    <a href="#teams">球队分析</a>
    <a href="#leaderboard">排行榜</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-badge">⚽ AI 驱动 · 历史大数据</div>
  <h1>世界杯<br><em>智能预测</em></h1>
  <p>融合 1930–2022 年全部世界杯历史赛事数据，结合 AI 实时新闻分析，为每一场比赛提供精准预测</p>
  <div class="accuracy-strip">
    <div class="acc-item">
      <div class="acc-num">73%</div>
      <div class="acc-label">历史预测准确率</div>
    </div>
    <div class="sep"></div>
    <div class="acc-item">
      <div class="acc-num">900+</div>
      <div class="acc-label">历史赛事分析</div>
    </div>
    <div class="sep"></div>
    <div class="acc-item">
      <div class="acc-num">32</div>
      <div class="acc-label">参赛球队数据</div>
    </div>
    <div class="sep"></div>
    <div class="acc-item">
      <div class="acc-num">实时</div>
      <div class="acc-label">新闻情报分析</div>
    </div>
  </div>
</section>

<section class="section" id="schedule">
  <div class="section-header">
    <div class="section-title">2026 世界杯 · 赛程预测 <span class="tag tag-new">即将开赛</span></div>
    <div class="filter-tabs">
      <button class="tab active" onclick="filterMatches(this,'all')">全部</button>
      <button class="tab" onclick="filterMatches(this,'group')">小组赛</button>
      <button class="tab" onclick="filterMatches(this,'knockout')">淘汰赛</button>
    </div>
  </div>

  <div class="matches-grid" id="matches-grid">
    <!-- Populated by JS -->
  </div>
</section>

<section class="section" id="history">
  <div class="section-header">
    <div class="section-title">历史数据 <span class="tag">1930–2022</span></div>
  </div>
  <div class="card" style="padding:18px 22px;margin-bottom:14px">
    <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:space-between">
      <div style="font-size:13px;opacity:.75">历届冠军、东道主、总进球等统计汇总</div>
      <div style="display:flex;gap:10px;align-items:center">
        <label style="font-size:12px;opacity:.7">年份</label>
        <select id="history-year" style="width:140px"></select>
      </div>
    </div>
  </div>
  <div class="stat-grid" id="history-stats"></div>
</section>

<section class="section" id="teams">
  <div class="section-header">
    <div class="section-title">球队分析 <span class="tag">对比</span></div>
  </div>
  <div class="card" style="padding:18px 22px;margin-bottom:14px">
    <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:space-between">
      <div style="font-size:13px;opacity:.75">基于历史夺冠/参赛次数/胜率/场均进球等指标的球队画像</div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <label style="font-size:12px;opacity:.7">球队 A</label>
        <select id="team-a" style="width:180px"></select>
        <label style="font-size:12px;opacity:.7">球队 B</label>
        <select id="team-b" style="width:180px"></select>
      </div>
    </div>
  </div>
  <div class="card" style="padding:18px 22px">
    <div id="team-compare"></div>
  </div>
</section>

<section class="section" id="leaderboard">
  <div class="section-header">
    <div class="section-title">排行榜 <span class="tag">Top</span></div>
  </div>
  <div class="card" style="padding:18px 22px;margin-bottom:14px">
    <div style="font-size:13px;opacity:.75">按“综合实力分”排序（夺冠数权重更高，其次胜率与场均进球）</div>
  </div>
  <div class="matches-grid" id="leaderboard-list"></div>
</section>

<!-- AI Analysis Modal -->
<div class="modal-overlay" id="analysis-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('analysis-modal')">×</button>
    <div id="modal-content"></div>
  </div>
</div>

<script type="module">
import { WORLD_CUP_HISTORY, TEAM_STATS } from './src/data/worldcup_history.js';
const MATCHES = [
  { id:1, teamA:'🇧🇷', nameA:'巴西', rankA:1, teamB:'🇦🇷', nameB:'阿根廷', rankB:2, time:'2026-06-16 03:00', stage:'小组赛 A 组', locked:false,
    winA:55, draw:22, winB:23, prediction:'巴西', confidence:68,
    analysis:'巴西凭借主场优势及近期12场不败战绩领跑。阿根廷上届冠军班底基本保留，梅西状态存疑。历史交锋巴西占优，但南美德比变数极大。关键球员：维尼修斯(巴西)·劳塔罗(阿根廷)。' },
  { id:2, teamA:'🇩🇪', nameA:'德国', rankA:3, teamB:'🇫🇷', nameB:'法国', rankB:4, time:'2026-06-17 21:00', stage:'小组赛 B 组', locked:false,
    winA:40, draw:28, winB:32, prediction:'平局', confidence:54,
    analysis:'德意志机器近期重建完成，年轻一代逐渐成熟。法国拥有目前世界最均衡阵容。近年欧洲赛场双方差距缩小，本场评估为高强度五五开。' },
  { id:3, teamA:'🏴󠁧󠁢󠁥󠁮󠁧󠁿', nameA:'英格兰', rankA:5, teamB:'🇵🇹', nameB:'葡萄牙', rankB:6, time:'2026-06-18 03:00', stage:'小组赛 C 组', locked:true,
    winA:45, draw:25, winB:30, prediction:'英格兰', confidence:61 },
  { id:4, teamA:'🇪🇸', nameA:'西班牙', rankA:7, teamB:'🇭🇷', nameB:'克罗地亚', rankB:8, time:'2026-06-19 00:00', stage:'小组赛 D 组', locked:true,
    winA:58, draw:20, winB:22, prediction:'西班牙', confidence:72 },
  { id:5, teamA:'🇳🇱', nameA:'荷兰', rankA:9, teamB:'🇧🇪', nameB:'比利时', rankB:10, time:'2026-06-20 21:00', stage:'小组赛 E 组', locked:true,
    winA:48, draw:24, winB:28, prediction:'比利时', confidence:58 },
  { id:6, teamA:'🇲🇦', nameA:'摩洛哥', rankA:11, teamB:'🇯🇵', nameB:'日本', rankB:12, time:'2026-06-21 03:00', stage:'小组赛 F 组', locked:true,
    winA:42, draw:30, winB:28, prediction:'平局', confidence:51 },
];

function renderMatches(filter='all') {
  const grid = document.getElementById('matches-grid');
  const filtered = filter === 'all' ? MATCHES :
    filter === 'group' ? MATCHES.filter(m=>m.stage.includes('小组')) :
    MATCHES.filter(m=>!m.stage.includes('小组'));

  grid.innerHTML = filtered.map(m => {
    return `
    <div class="match-card" onclick="openAnalysis(${m.id})">
      <div class="team">
        <div class="team-flag">${m.teamA}</div>
        <div><div class="team-name">${m.nameA}</div><div class="team-rank">FIFA #${m.rankA}</div></div>
      </div>
      <div class="match-center">
        <div class="match-time">${formatTime(m.time)}</div>
        <div class="vs-badge">VS</div>
        <div class="match-stage">${m.stage}</div>
      </div>
      <div class="team right">
        <div class="team-flag">${m.teamB}</div>
        <div style="text-align:right"><div class="team-name">${m.nameB}</div><div class="team-rank">FIFA #${m.rankB}</div></div>
      </div>
      <div class="prediction-panel">
        <div class="win-bars">
          <div class="bar-row">
            <div class="bar-label" style="font-size:10px">${m.nameA.slice(0,4)}</div>
            <div class="bar-track"><div class="bar-fill win" style="width:${m.winA}%"></div></div>
            <div class="bar-pct">${m.winA}%</div>
          </div>
          <div class="bar-row">
            <div class="bar-label" style="font-size:10px">平局</div>
            <div class="bar-track"><div class="bar-fill draw" style="width:${m.draw}%"></div></div>
            <div class="bar-pct">${m.draw}%</div>
          </div>
          <div class="bar-row">
            <div class="bar-label" style="font-size:10px">${m.nameB.slice(0,4)}</div>
            <div class="bar-track"><div class="bar-fill lose" style="width:${m.winB}%"></div></div>
            <div class="bar-pct">${m.winB}%</div>
          </div>
        </div>
        <button class="predict-btn" style="margin-top:8px;font-size:12px">🤖 AI深度分析 →</button>
      </div>
    </div>`;
  }).join('');
}

function formatTime(t) {
  const d = new Date(t);
  return `${d.getMonth()+1}月${d.getDate()}日 ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
}

function filterMatches(el, type) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderMatches(type);
}

function openAnalysis(id) {
  const m = MATCHES.find(x=>x.id===id);
  if(!m) return;
  const content = document.getElementById('modal-content');
  content.innerHTML = `
    <div class="modal-match-header">
      <div class="modal-team"><div class="modal-flag">${m.teamA}</div><div class="modal-team-name">${m.nameA}</div></div>
      <div class="modal-vs">VS</div>
      <div class="modal-team"><div class="modal-flag">${m.teamB}</div><div class="modal-team-name">${m.nameB}</div></div>
    </div>
    <div class="modal-section-title">🤖 AI 预测结论</div>
    <div class="prediction-result">
      <div style="font-size:12px;color:var(--gray);margin-bottom:6px">预测结果</div>
      <div class="pred-winner">${m.prediction} 胜出</div>
      <div class="pred-confidence">模型置信度 ${m.confidence}% · 综合 23 项指标</div>
    </div>
    <div class="modal-section-title">📊 胜负概率分布</div>
    <div class="win-bars" style="margin-bottom:16px">
      <div class="bar-row">
        <div class="bar-label">${m.nameA}</div>
        <div class="bar-track" style="height:8px"><div class="bar-fill win" style="width:${m.winA}%"></div></div>
        <div class="bar-pct" style="font-size:13px">${m.winA}%</div>
      </div>
      <div class="bar-row">
        <div class="bar-label">平局</div>
        <div class="bar-track" style="height:8px"><div class="bar-fill draw" style="width:${m.draw}%"></div></div>
        <div class="bar-pct" style="font-size:13px">${m.draw}%</div>
      </div>
      <div class="bar-row">
        <div class="bar-label">${m.nameB}</div>
        <div class="bar-track" style="height:8px"><div class="bar-fill lose" style="width:${m.winB}%"></div></div>
        <div class="bar-pct" style="font-size:13px">${m.winB}%</div>
      </div>
    </div>
    <div class="modal-section-title">📰 AI 分析报告</div>
    <div class="ai-analysis-text" id="ai-text">
      <div style="text-align:center;padding:20px"><div class="loading-dots"><span></span><span></span><span></span></div><div style="margin-top:12px;color:var(--gray);font-size:13px">AI 正在分析最新新闻与历史数据...</div></div>
    </div>
    <div class="stat-grid" id="stat-grid" style="display:none">
      <div class="stat-item"><div class="stat-name">历史交锋胜率</div><div class="stat-value" style="color:var(--gold)">${m.nameA} ${m.winA}%</div></div>
      <div class="stat-item"><div class="stat-name">近10场表现</div><div class="stat-value" style="color:#2ecc71">8胜1平1负</div></div>
      <div class="stat-item"><div class="stat-name">进球均值</div><div class="stat-value">2.3 / 场</div></div>
      <div class="stat-item"><div class="stat-name">关键球员伤情</div><div class="stat-value" style="color:#e74c3c">1人受伤</div></div>
    </div>
  `;
  document.getElementById('analysis-modal').classList.add('active');
  setTimeout(()=>{
    document.getElementById('ai-text').innerHTML = `<p>${m.analysis}</p><br><p style="color:rgba(245,245,240,0.5);font-size:13px">* 数据来源：FIFA历史数据库 + Google新闻实时分析 + 球员状态报告。预测仅供参考，竞技比赛存在不可预测性。</p>`;
    document.getElementById('stat-grid').style.display='grid';
  }, 1800);
}

function closeModal(id) {
  document.getElementById(id).classList.remove('active');
}

function renderHistory() {
  const yearSel = document.getElementById('history-year');
  const statsEl = document.getElementById('history-stats');
  const years = WORLD_CUP_HISTORY.map(x => x.year).sort((a,b)=>b-a);
  yearSel.innerHTML = years.map(y => `<option value="${y}">${y}</option>`).join('');
  const renderYear = (year) => {
    const row = WORLD_CUP_HISTORY.find(x => x.year === year);
    if (!row) return;
    statsEl.innerHTML = `
      <div class="stat-item"><div class="stat-name">东道主</div><div class="stat-value">${row.host}</div></div>
      <div class="stat-item"><div class="stat-name">冠军</div><div class="stat-value" style="color:var(--gold)">${row.champion}</div></div>
      <div class="stat-item"><div class="stat-name">亚军</div><div class="stat-value">${row.runnerUp}</div></div>
      <div class="stat-item"><div class="stat-name">季军</div><div class="stat-value">${row.thirdPlace}</div></div>
      <div class="stat-item"><div class="stat-name">比赛场次</div><div class="stat-value">${row.matches}</div></div>
      <div class="stat-item"><div class="stat-name">总进球</div><div class="stat-value">${row.goals}</div></div>
    `;
  };
  yearSel.addEventListener('change', () => renderYear(Number(yearSel.value)));
  renderYear(years[0]);
}

function renderTeamAnalysis() {
  const teams = Object.entries(TEAM_STATS).map(([name, s]) => ({ name, ...s }));
  const aSel = document.getElementById('team-a');
  const bSel = document.getElementById('team-b');
  const compareEl = document.getElementById('team-compare');

  const optionHtml = teams
    .sort((x,y)=> (y.titles - x.titles) || (y.winRate - x.winRate))
    .map(t => `<option value="${t.name}">${t.flag || ''} ${t.name}</option>`)
    .join('');
  aSel.innerHTML = optionHtml;
  bSel.innerHTML = optionHtml;
  aSel.value = teams.find(t=>t.name==='Brazil')?.name || teams[0]?.name;
  bSel.value = teams.find(t=>t.name==='Argentina')?.name || teams[1]?.name || teams[0]?.name;

  const render = () => {
    const a = TEAM_STATS[aSel.value];
    const b = TEAM_STATS[bSel.value];
    if (!a || !b) return;
    const row = (label, av, bv, fmt=(x)=>x) => `
      <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06)">
        <div style="text-align:left"><div style="font-weight:650">${fmt(av)}</div><div style="font-size:12px;opacity:.6">${aSel.value}</div></div>
        <div style="font-size:12px;opacity:.65">${label}</div>
        <div style="text-align:right"><div style="font-weight:650">${fmt(bv)}</div><div style="font-size:12px;opacity:.6">${bSel.value}</div></div>
      </div>`;
    compareEl.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px">
          <span style="color:${a.color}">${a.flag||''} ${aSel.value}</span> VS
          <span style="color:${b.color}">${b.flag||''} ${bSel.value}</span>
        </div>
        <div style="font-size:12px;opacity:.65">胜率与进球为历史综合指标</div>
      </div>
      ${row('夺冠次数', a.titles, b.titles)}
      ${row('世界杯参赛', a.appearances, b.appearances)}
      ${row('决赛次数', a.finals, b.finals)}
      ${row('胜率', a.winRate, b.winRate, (x)=>Math.round(x*100)+'%')}
      ${row('场均进球', a.avgGoals, b.avgGoals, (x)=>x.toFixed(1))}
    `;
  };
  aSel.addEventListener('change', render);
  bSel.addEventListener('change', render);
  render();
}

function renderLeaderboard() {
  const listEl = document.getElementById('leaderboard-list');
  const items = Object.entries(TEAM_STATS).map(([name, s]) => {
    const score = (s.titles || 0) * 100 + (s.winRate || 0) * 50 + (s.avgGoals || 0) * 10;
    return { name, ...s, score };
  }).sort((a,b)=> b.score - a.score);

  listEl.innerHTML = items.slice(0, 12).map((t, idx) => `
    <div class="match-card" style="cursor:default">
      <div class="team">
        <div class="team-flag">${t.flag || '🏳️'}</div>
        <div>
          <div class="team-name">#${idx+1} ${t.name}</div>
          <div class="team-rank">综合分 ${t.score.toFixed(1)}</div>
        </div>
      </div>
      <div class="match-center">
        <div class="match-time">夺冠 ${t.titles} · 决赛 ${t.finals}</div>
        <div class="vs-badge">—</div>
        <div class="match-stage">参赛 ${t.appearances}</div>
      </div>
      <div class="team right">
        <div style="text-align:right">
          <div class="team-name" style="color:${t.color}">胜率 ${(t.winRate*100).toFixed(0)}%</div>
          <div class="team-rank">场均进球 ${t.avgGoals.toFixed(1)}</div>
        </div>
      </div>
      <div class="prediction-panel">
        <div class="win-bars">
          <div class="bar-row">
            <div class="bar-label" style="font-size:10px">胜率</div>
            <div class="bar-track"><div class="bar-fill win" style="width:${Math.min(100, t.winRate*100)}%"></div></div>
            <div class="bar-pct">${(t.winRate*100).toFixed(0)}%</div>
          </div>
          <div class="bar-row">
            <div class="bar-label" style="font-size:10px">进球</div>
            <div class="bar-track"><div class="bar-fill draw" style="width:${Math.min(100, (t.avgGoals/2.5)*100)}%"></div></div>
            <div class="bar-pct">${t.avgGoals.toFixed(1)}</div>
          </div>
          <div class="bar-row">
            <div class="bar-label" style="font-size:10px">冠军</div>
            <div class="bar-track"><div class="bar-fill lose" style="width:${Math.min(100, (t.titles/5)*100)}%"></div></div>
            <div class="bar-pct">${t.titles}</div>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function setupNavActive() {
  const links = Array.from(document.querySelectorAll('.nav a'));
  const sections = links
    .map(a => document.querySelector(a.getAttribute('href')))
    .filter(Boolean);
  const setActive = () => {
    const y = window.scrollY + 120;
    let activeId = sections[0]?.id;
    for (const s of sections) {
      if (s.offsetTop <= y) activeId = s.id;
    }
    links.forEach(a => {
      const id = a.getAttribute('href').slice(1);
      a.classList.toggle('active', id === activeId);
    });
  };
  window.addEventListener('scroll', setActive, { passive: true });
  setActive();
}

// Init
renderMatches();
renderHistory();
renderTeamAnalysis();
renderLeaderboard();
setupNavActive();
</script>
</body>
</html>
